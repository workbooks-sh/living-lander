<section class="grown">
  <div class="kicker">06 · the invitation</div>

  <div style="display:grid;grid-template-columns:minmax(0,1fr) auto;gap:48px;align-items:end;max-width:860px;">
    <div style="display:flex;flex-direction:column;gap:0;">
      <h2 class="t-h2 fs-h2" style="margin:0 0 24px;max-width:18ch;">
        You don't deploy a workbook. You <em style="font-style:italic;color:var(--ink);">join</em> it.
      </h2>
      <p class="fs-lede" style="color:var(--dim);margin:0 0 40px;max-width:46ch;">
        Software you can edit like a document, with an agent working inside it.
        Describe what you want; build it together; keep shaping it. This page is
        one such thing — start your own.
      </p>

      <!-- the ask: the one node that breathes, sacred green = life -->
      <a href="#get" class="glass" style="display:inline-flex;align-items:center;gap:14px;align-self:flex-start;padding:16px 24px 16px 20px;text-decoration:none;border-color:color-mix(in srgb, var(--live) 34%, var(--glass-edge));">
        <span class="alive" style="width:9px;height:9px;border-radius:50%;background:var(--live);flex:0 0 auto;display:inline-block;box-shadow:0 0 12px color-mix(in srgb, var(--live) 60%, transparent);"></span>
        <span style="display:flex;flex-direction:column;gap:3px;">
          <span style="font:500 11px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--live);">start a workbook</span>
          <span class="fs-mono-body" style="color:var(--ink);line-height:1.1;">build with your agent &rarr;</span>
        </span>
      </a>
    </div>

    <!-- WMark beside: life is literal here, the invitation reaches -->
    <svg viewBox="0 0 64 64" fill="none" aria-hidden="true"
         style="width:64px;height:64px;flex:0 0 auto;opacity:.7;">
      <path d="M8 16 L18 48 L32 24 L46 48 L56 16" stroke="var(--live)" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle class="alive" cx="32" cy="24" r="3" fill="var(--live)"/>
    </svg>
  </div>
</section>
